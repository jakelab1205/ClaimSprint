<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClaimSprint{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
    }
    .nav-brand { font-size: 1rem; font-weight: 700; color: #1a1a2e; text-decoration: none; }
    .nav-brand:hover { color: #1d4ed8; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-link { font-size: 0.88rem; color: #374151; text-decoration: none; padding-bottom: 2px; }
    .nav-link:hover { color: #1d4ed8; }
    .nav-link.active { font-weight: 700; color: #1a1a2e; border-bottom: 2px solid #1d4ed8; }

    .severity-badge { display: inline-block; border-radius: 999px; font-weight: 700; }
    .severity-low    { background: #d1fae5; color: #065f46; }
    .severity-medium { background: #fef3c7; color: #92400e; }
    .severity-high   { background: #fee2e2; color: #991b1b; }
    .severity-critical { background: #7f1d1d; color: #fff; }

    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  <header class="site-nav">
    <a class="nav-brand" href="{% url 'index' %}">ClaimSprint</a>
    <nav class="nav-links">
      <a class="nav-link{% if request.resolver_match.url_name == 'staff_directory' %} active{% endif %}" href="{% url 'staff_directory' %}">Staff Directory</a>
      <a class="nav-link{% if request.resolver_match.url_name == 'history' %} active{% endif %}" href="{% url 'history' %}">Audit Log</a>
      <a class="nav-link{% if request.resolver_match.url_name == 'settings' or request.resolver_match.url_name == 'settings_claim_types' or request.resolver_match.url_name == 'settings_handlers' %} active{% endif %}" href="{% url 'settings' %}">Settings</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
