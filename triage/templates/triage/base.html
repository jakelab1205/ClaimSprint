{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClaimSprint{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'triage/app.css' %}">
  <style>
    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  <header class="site-nav">
    <a class="nav-brand" href="{% url 'index' %}">ClaimSprint</a>
    <nav class="nav-links">
      <a class="nav-link{% if request.resolver_match.url_name == 'staff_directory' %} active{% endif %}" href="{% url 'staff_directory' %}">Staff Directory</a>
      <a class="nav-link{% if request.resolver_match.url_name == 'history' %} active{% endif %}" href="{% url 'history' %}">Audit Log</a>
      <a class="nav-link{% if request.resolver_match.url_name == 'settings' or request.resolver_match.url_name == 'settings_claim_types' or request.resolver_match.url_name == 'settings_handlers' %} active{% endif %}" href="{% url 'settings' %}">Settings</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
