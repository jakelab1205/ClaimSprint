<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaimSprint — FNOL Triage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); padding: 2.5rem; width: 100%; max-width: 720px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; letter-spacing: -0.5px; }
    .subtitle { color: #555; font-size: 0.95rem; margin-bottom: 1.8rem; }
    label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; }
    textarea { width: 100%; padding: 0.8rem 1rem; border: 1px solid #d0d5dd; border-radius: 6px; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.85rem; line-height: 1.6; resize: vertical; color: #1a1a2e; }
    textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    button { margin-top: 1.2rem; width: 100%; padding: 0.85rem; background: #1d4ed8; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #1e40af; }
    .hint { margin-top: 1rem; font-size: 0.8rem; color: #888; }
    .footer-link { margin-top: 1rem; font-size: 0.9rem; color: #2563eb; text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e5e7eb;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>ClaimSprint</h1>
    <p class="subtitle">Paste a First Notice of Loss below. The system will classify the claim, assess severity, and recommend a handler.</p>
    <div id="form-body">
      <form method="post" id="triage-form">
        {% csrf_token %}
        <label for="fnol_text">FNOL Text</label>
        <textarea id="fnol_text" name="fnol_text" rows="18" placeholder="Paste the claim notification here..."></textarea>
        <button type="submit" id="submitBtn" onclick="return submitForm(this);">Triage Claim</button>
      </form>
      <p class="hint">Processing takes 5-10 seconds. Do not refresh the page.</p>
    </div>
    <div id="loader" style="display:none; flex-direction:column; align-items:center; padding:3rem 0;">
      <div class="spinner"></div>
      <p id="loader-msg" style="margin-top:1.5rem; font-size:0.95rem; color:#374151;">Analysing claim&#8230;</p>
    </div>
  </div>
  <div style="display:flex; gap:1.5rem; margin-top:0.75rem;">
    <a class="footer-link" style="margin-top:0;" href="/staff/">Staff Directory</a>
    <a class="footer-link" style="margin-top:0;" href="/history/">Audit Log &#8594;</a>
    <a class="footer-link" style="margin-top:0;" href="/settings/">Settings</a>
  </div>

  <script>
    function submitForm(btn) {
      var text = document.getElementById('fnol_text').value.trim();
      if (!text) return false;

      document.getElementById('form-body').style.display = 'none';
      document.getElementById('loader').style.display = 'flex';
      var msgEl = document.getElementById('loader-msg');
      var msgs = ['Analysing claim\u2026', 'Assessing severity\u2026', 'Selecting handler\u2026'];
      var i = 0;
      var interval = setInterval(function() {
        i = (i + 1) % msgs.length;
        msgEl.textContent = msgs[i];
      }, 2500);

      var formData = new FormData(document.getElementById('triage-form'));
      fetch('/stream/', { method: 'POST', body: formData })
        .then(function(resp) {
          var reader = resp.body.getReader();
          var decoder = new TextDecoder();
          var buf = '';
          function read() {
            reader.read().then(function(chunk) {
              if (chunk.done) return;
              buf += decoder.decode(chunk.value, { stream: true });
              var parts = buf.split('\n\n');
              buf = parts.pop();
              parts.forEach(function(part) {
                if (!part.startsWith('data: ')) return;
                var evt = JSON.parse(part.slice(6));
                if (evt.type === 'done') {
                  clearInterval(interval);
                  document.open();
                  document.write(evt.html);
                  document.close();
                } else if (evt.type === 'error') {
                  clearInterval(interval);
                  msgEl.textContent = evt.message;
                }
              });
              read();
            });
          }
          read();
        })
        .catch(function() {
          clearInterval(interval);
          msgEl.textContent = 'Connection error. Please try again.';
        });

      return false;
    }
  </script>
</body>
</html>
